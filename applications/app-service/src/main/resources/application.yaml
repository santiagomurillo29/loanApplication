server:
  port: 8086
spring:
  application:
    name: "LoanApplication"
  devtools:
    add-properties: false
  r2dbc:
    url: "${SPRING_R2DBC_URL:r2dbc:postgresql://postgres-loan:5432/loan_application_db}"
    username: "${SPRING_R2DBC_USERNAME:root}"
    password: "${SPRING_R2DBC_PASSWORD:password}"
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
  sql:
    init:
      mode: always
    data:
      r2dbc:
        repositories:
          enabled: true
adapters:
  r2dbc:
    host: postgres-loan
    port: 5432
    database: loan_application_db
    schema: public
    username: root
    password: password
services:
  authentication:
    url: "http://authentication:8085"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuit breakers:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8086"
jwt:
  secret: "mysuperlongsecretkeythatismorethan32bytes123!"
adapter:
  sqs:
    region: "us-east-1"
    queueUrl: "https://sqs.us-east-1.amazonaws.com/418272784514/loan-application-queue"