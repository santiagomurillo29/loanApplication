adapters:
  r2dbc:
    host: localhost
    port: 5432
    database: LoanApplication
    schema: public
    username: postgres
    password: 30052630

services:
  authentication:
    #url: "http://authentication:8085"
    url: "http://localhost:8085"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8086"
jwt:
  secret: "mysuperlongsecretkeythatismorethan32bytes123!"
adapter:
  restconsumer:
    timeout: 5000
    url: "http://localhost:8085"
  sqs:
    region: "us-east-1"
    queueUrl: "https://sqs.us-east-1.amazonaws.com/418272784514/loan-application"
    # endpoint: "http://localhost:4566 # For localstack only"

resilience4j:
  circuitbreaker:
    instances:
      testGet:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
      testPost:
        registerHealthIndicator: true
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: "2s"
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowSize: 10
        minimumNumberOfCalls: 10
        waitDurationInOpenState: "10s"
